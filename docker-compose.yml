services:
  backend:
    build:
      context: ..
      dockerfile: no.1-production-ready-nl2sql/backend/Dockerfile
    env_file:
      - backend/.env.example
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-local}
      DEBUG: ${DEBUG:-true}
      CORS_ORIGINS: '["http://localhost:3001","http://127.0.0.1:3001"]'
      NL2SQL_RUNTIME_MODE: ${NL2SQL_RUNTIME_MODE:-deterministic}
      NL2SQL_PERSISTENCE_MODE: ${NL2SQL_PERSISTENCE_MODE:-oracle}
      NL2SQL_ONTOLOGY_WORKER_MODE: ${NL2SQL_ONTOLOGY_WORKER_MODE:-inprocess}
      NL2SQL_SCHEMA_REFRESH_WORKER_MODE: ${NL2SQL_SCHEMA_REFRESH_WORKER_MODE:-external}
      NL2SQL_QUALITY_EVALUATION_WORKER_MODE: ${NL2SQL_QUALITY_EVALUATION_WORKER_MODE:-external}
    volumes:
      - ontology-source-data:/u01/production-ready-nl2sql/ontology-sources
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 20s
      timeout: 5s
      retries: 5

  ontology-worker:
    profiles: ["ontology"]
    build:
      context: ..
      dockerfile: no.1-production-ready-nl2sql/backend/Dockerfile
    command: ["python", "-m", "app.features.nl2sql.ontology_worker"]
    env_file:
      - backend/.env.example
    environment:
      NL2SQL_RUNTIME_MODE: ${NL2SQL_RUNTIME_MODE:-oracle}
      NL2SQL_PERSISTENCE_MODE: ${NL2SQL_PERSISTENCE_MODE:-oracle}
      NL2SQL_ONTOLOGY_WORKER_MODE: external
    volumes:
      - ontology-source-data:/u01/production-ready-nl2sql/ontology-sources

  schema-refresh-worker:
    build:
      context: ..
      dockerfile: no.1-production-ready-nl2sql/backend/Dockerfile
    command: ["python", "-m", "app.cli.nl2sql_schema_refresh_worker", "--poll-seconds", "1"]
    env_file:
      - backend/.env.example
    environment:
      NL2SQL_RUNTIME_MODE: ${NL2SQL_RUNTIME_MODE:-oracle}
      NL2SQL_PERSISTENCE_MODE: ${NL2SQL_PERSISTENCE_MODE:-oracle}
      NL2SQL_SCHEMA_REFRESH_WORKER_MODE: external

  quality-evaluation-worker:
    build:
      context: ..
      dockerfile: no.1-production-ready-nl2sql/backend/Dockerfile
    command: ["python", "-m", "app.cli.nl2sql_quality_evaluation_worker"]
    env_file:
      - backend/.env.example
    environment:
      NL2SQL_RUNTIME_MODE: ${NL2SQL_RUNTIME_MODE:-oracle}
      NL2SQL_PERSISTENCE_MODE: ${NL2SQL_PERSISTENCE_MODE:-oracle}
      NL2SQL_QUALITY_EVALUATION_WORKER_MODE: external

  frontend:
    build:
      context: ..
      dockerfile: no.1-production-ready-nl2sql/frontend/Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3001:80"

volumes:
  ontology-source-data:
