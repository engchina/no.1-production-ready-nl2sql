name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: no.1-production-ready-nl2sql/frontend
    steps:
      # アプリと共有 UI パッケージを sibling に並べ、frontend の
      # file:../../no.1-production-ready-platform/packages/ui を CI でも解決できるようにする。
      # （GitHub Packages へ切替後はこの sibling checkout / build を削除し、npm ci のみにする。
      #  docs: no.1-production-ready-platform/docs/consume-in-ci.md）
      - name: Checkout app
        uses: actions/checkout@v4
        with:
          path: no.1-production-ready-nl2sql

      - name: Checkout shared UI package
        uses: actions/checkout@v4
        with:
          repository: engchina/no.1-production-ready-platform
          ref: main
          path: no.1-production-ready-platform
          token: ${{ secrets.SHARED_UI_REPO_TOKEN || github.token }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            no.1-production-ready-nl2sql/frontend/package-lock.json
            no.1-production-ready-platform/package-lock.json

      - name: Build shared UI package
        working-directory: no.1-production-ready-platform
        run: |
          npm ci
          npm run build

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Logic tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e

  backend:
    name: Backend
    runs-on: ubuntu-latest
    env:
      NL2SQL_RUNTIME_MODE: memory
      NL2SQL_FEEDBACK_EMBEDDING_ENABLED: "false"
    defaults:
      run:
        working-directory: no.1-production-ready-nl2sql/backend
    steps:
      # backend は共有 production-ready-backend-core（platform repo の sibling パス）に依存する。
      - name: Checkout app
        uses: actions/checkout@v4
        with:
          path: no.1-production-ready-nl2sql

      - name: Checkout shared platform packages
        uses: actions/checkout@v4
        with:
          repository: engchina/no.1-production-ready-platform
          ref: main
          path: no.1-production-ready-platform
          token: ${{ secrets.SHARED_UI_REPO_TOKEN || github.token }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: no.1-production-ready-nl2sql/backend/uv.lock

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Format check
        run: uv run black --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy .

      - name: Test
        run: uv run pytest --cov=app

      - name: Security scan
        run: uv run bandit -r app

      - name: Dependency audit
        # OCI SDK currently constrains cryptography to <47.0.0, while GHSA-537c-gmf6-5ccf
        # lists 48.0.1 as the first fixed version. Keep auditing all other findings.
        run: uv run pip-audit --ignore-vuln GHSA-537c-gmf6-5ccf
